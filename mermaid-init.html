<style>
  /* Base styles */
  .mermaid {
    width: 100% !important;
    max-width: 100% !important;
    margin: 20px auto !important;
    display: block;
    background: white;
    padding: 10px;
  }
  
  .mermaid svg {
    width: 100% !important;
    height: auto !important;
  }

  /* Academic styling for the HTML document */
  body {
    max-width: 1000px; 
    margin: 0 auto;
    padding: 20px;
    font-family: 'Times New Roman', Times, serif; 
    line-height: 1.5;
    color: #000;
    background-color: white;
  }
  
  .main-content {
    padding: 40px;
  }
  
  h1, h2, h3 {
    color: #000;
    border-bottom: 1px solid #000;
    padding-bottom: 5px;
    margin-top: 1.5em;
  }
  
  /* Print-specific optimizations */
  @media print {
    body {
      padding: 0;
      font-size: 12pt;
    }
    .main-content {
      padding: 0;
      box-shadow: none;
    }
    .mermaid {
      page-break-inside: avoid;
      overflow: visible !important;
    }
    .mermaid svg {
      max-width: 100% !important;
    }
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    font-size: 10pt;
  }
  
  th, td {
    border: 1px solid #000;
    padding: 8px;
    text-align: left;
  }
  
  th {
    background-color: #f2f2f2;
  }
</style>

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
  
  // Fix Pandoc's output
  document.querySelectorAll('pre.mermaid code').forEach(code => {
    const pre = code.parentElement;
    pre.textContent = code.textContent;
  });

  mermaid.initialize({ 
    startOnLoad: true,
    theme: 'neutral',
    securityLevel: 'loose',
    gantt: {
      useWidth: 1000,
      todayMarker: {
        stroke: '#ff0000',
        strokeWidth: '2px'
      },
      fontSize: 12,
      sectionFontSize: 14,
      axisFormat: '%b %d',
      tickInterval: '1 week',
      topPadding: 30,
      leftPadding: 150
    }
  });

  // Adding a manual label for the Today Marker after it renders
  mermaid.run().then(() => {
    const todayLines = document.querySelectorAll('.today');
    todayLines.forEach(line => {
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', line.getAttribute('x1'));
      text.setAttribute('y', '25');
      text.setAttribute('fill', 'red');
      text.setAttribute('font-size', '12px');
      text.setAttribute('font-weight', 'bold');
      text.textContent = 'Current Progress';
      line.parentElement.appendChild(text);
    });
  });
</script>
